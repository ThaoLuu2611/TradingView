<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/klinecharts@9/dist/klinecharts.min.js"></script>
</head>
<body style="margin: 0; padding: 0;">
  <div id="chart" style="width: 100%; height: 400px; background: #eee;"></div>
  <script>
    const chart = klinecharts.init('chart')
    chart.applyNewData([{ close: 10, high: 12, low: 9, open: 11, timestamp: 1 }])
    
    // Create 3 indicators with height 100
    const p1 = chart.createIndicator('RSI', false, { height: 100 })
    const p2 = chart.createIndicator('MACD', false, { height: 100 })
    const p3 = chart.createIndicator('KDJ', false, { height: 100 })
    
    setTimeout(() => {
      document.body.innerHTML += `<p>Pane 1: ${p1}</p>`
      document.body.innerHTML += `<p>Pane 2: ${p2}</p>`
      document.body.innerHTML += `<p>Pane 3: ${p3}</p>`
    }, 500)
  </script>
</body>
</html>
