<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/klinecharts@9/dist/klinecharts.min.js"></script>
</head>
<body>
  <div id="chart" style="width:600px;height:400px;"></div>
  <script>
    const chart = klinecharts.init('chart');
    chart.applyNewData([{timestamp: Date.now(), open: 1, high: 2, low: 1, close: 2}]);
    chart.createIndicator('MACD', false, { id: 'pane1' });
    console.log('pane options:', chart.getPaneOptions('candle_pane'));
  </script>
</body>
</html>
