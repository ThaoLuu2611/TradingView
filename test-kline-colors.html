<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/klinecharts@9/dist/klinecharts.min.js"></script>
</head>
<body>
  <div id="chart" style="width: 600px; height: 400px;"></div>
  <script>
    const chart = klinecharts.init('chart');
    chart.applyNewData([{ timestamp: Date.now(), open: 1, high: 2, low: 1, close: 1, volume: 1 }]);
    
    // Attempt 1: styles in createIndicator
    chart.createIndicator({
      name: 'EMA',
      calcParams: [7, 25, 99],
      styles: {
        lines: [
          { color: '#ff0000', size: 2, style: 'solid' }, // red
          { color: '#00ff00', size: 2, style: 'solid' }, // green
          { color: '#0000ff', size: 2, style: 'solid' }  // blue
        ]
      }
    }, false, { id: 'pane1' });

    // Attempt 2: global overrideIndicator
    chart.overrideIndicator({
      name: 'EMA',
      styles: {
        lines: [
          { color: '#ff00ff', size: 2, style: 'solid' }, // magenta
          { color: '#00ffff', size: 2, style: 'solid' }, // cyan
          { color: '#ffff00', size: 2, style: 'solid' }  // yellow
        ]
      }
    });
    chart.createIndicator('EMA', false, { id: 'pane2' });
  </script>
</body>
</html>
